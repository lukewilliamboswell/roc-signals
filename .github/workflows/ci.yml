name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  linux-checks:
    name: Linux checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.16.0
          use-cache: false

      - name: Install Roc
        uses: roc-lang/setup-roc@cbe782d6f165b89c87d99f50a59ac4f5f73b4427
        with:
          version: nightly-new-compiler

      - name: Install site tools
        run: |
          curl -fsSL https://github.com/getzola/zola/releases/download/v0.22.1/zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz -o zola.tar.gz
          tar -xzf zola.tar.gz
          sudo mv zola /usr/local/bin/zola
          curl -fsSL https://github.com/tailwindlabs/tailwindcss/releases/download/v3.4.17/tailwindcss-linux-x64 -o tailwindcss
          chmod +x tailwindcss
          sudo mv tailwindcss /usr/local/bin/tailwindcss

      - name: Run non-native suites
        run: |
          python3 scripts/test.py zig browser roc-check wasm --native never --bundle never

      - name: Build static site
        run: python3 scripts/serve.py --no-server

      - name: Upload static site artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages-dist
          path: dist

      - name: Upload GitHub Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  macos-full:
    name: macOS full suite
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.16.0
          use-cache: false

      - name: Install Roc
        uses: roc-lang/setup-roc@cbe782d6f165b89c87d99f50a59ac4f5f73b4427
        with:
          version: nightly-new-compiler

      - name: Run all tests
        run: python3 scripts/test.py

  macos-coverage:
    name: macOS coverage
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.16.0
          use-cache: false

      - name: Install coverage dependencies
        run: brew install dwarfutils

      - name: Run native host coverage
        run: |
          sudo env \
            "PATH=$PATH" \
            "ZIG_GLOBAL_CACHE_DIR=$GITHUB_WORKSPACE/.zig-cache" \
            "ZIG_LOCAL_CACHE_DIR=$GITHUB_WORKSPACE/.zig-cache" \
            python3 scripts/coverage.py \
              --min 86.5 \
              --min-file src/signals/engine.zig=71.0 \
              --min-file src/signals/descriptor_stream.zig=76.0 \
              --min-file src/native_host.zig=94.0 \
              --min-file src/signals/roc_platform_abi.zig=72.0 \
              --min-file src/spec/spec_parser.zig=90.0 \
              --top 20

      - name: Upload native host coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-host-coverage
          path: kcov-output/native-host

  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-24.04
    needs:
      - linux-checks
      - macos-full
      - macos-coverage
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
