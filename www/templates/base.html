<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ config.title }}{% endblock title %}</title>
    <meta name="description" content="{{ config.description }}">
    <link rel="icon" href="{{ get_url(path='favicon.svg') }}" type="image/svg+xml">
    <link rel="stylesheet" href="{{ get_url(path='signals.css') }}">
  </head>
  <body class="min-h-screen">
    <header class="border-b border-zinc-200 bg-white/95">
      <nav class="mx-auto flex w-full max-w-6xl flex-wrap items-center justify-between gap-3 px-4 py-4 sm:px-6 lg:px-8">
        <a class="text-base font-semibold text-zinc-950 no-underline hover:text-emerald-700 hover:no-underline" href="{{ get_url(path='') }}">Roc Signals</a>
        <div class="flex flex-wrap items-center gap-3 text-sm">
          <a href="{{ get_url(path='docs/guide/', trailing_slash=true) }}">Guide</a>
          <a href="{{ get_url(path='examples/', trailing_slash=true) }}">Examples</a>
          <a href="{{ config.extra.github_url }}">GitHub</a>
        </div>
      </nav>
    </header>
    {% block content %}{% endblock content %}
    <script type="module" src="{{ get_url(path='site.mjs') }}"></script>
  </body>
</html>
